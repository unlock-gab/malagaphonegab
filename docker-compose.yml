version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://malaga:${POSTGRES_PASSWORD}@db:5432/malagaphone
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=malaga
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=malagaphone
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malaga -d malagaphone"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  pgdata:
